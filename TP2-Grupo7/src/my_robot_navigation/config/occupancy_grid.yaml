occupancy_grid:
  ros__parameters:
    resolution: 0.05      # metros por celda
    width: 400            # 20 m en x  (odom x de -10 a 10)
    height: 400           # 20 m en y  (odom y de -10 a 10)
    origin_x: -10.0       # grilla simetrica y centrada en el spawn (odom 0,0)
    origin_y: -10.0       # asi no depende del yaw de spawn ni del frame mundo
    frame_id: "odom"
    mark_radius: 1